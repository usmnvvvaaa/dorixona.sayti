<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dori haqida - MedPharm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fas fa-prescription-bottle-alt me-2"></i>MedPharm
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><button class="btn btn-outline-light" onclick="openCartModal()"><i class="fas fa-shopping-cart"></i> Savat <span id="cartCount" class="badge bg-danger ms-1">0</span></button></li>
            </ul>
            <div id="authBtn" class="ms-3"></div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-5">
            <img id="productImage" class="img-fluid rounded shadow" src="" alt="">
        </div>
        <div class="col-md-7">
            <span id="productCategory" class="badge bg-primary mb-2 p-2"></span>
            <h1 id="productName" class="display-5 fw-bold"></h1>
            <h2 id="productPrice" class="text-primary my-3"></h2>
            <p id="productDesc" class="lead"></p>
            <button id="addToCartBtn" class="btn btn-success btn-lg mt-3"><i class="fas fa-cart-plus"></i> Savatga qo'shish</button>
            <a href="index.html" class="btn btn-outline-secondary btn-lg mt-3 ms-2"><i class="fas fa-arrow-left"></i> Orqaga</a>
        </div>
    </div>
</div>


<div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-shopping-cart"></i> Savatcha</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="cartItemsContainer">
                <p class="text-center text-muted">Savatcha bo'sh</p>
            </div>
            <div class="modal-footer">
                <div class="w-100">
                    <div class="d-flex justify-content-between mb-3">
                        <strong>Jami:</strong>
                        <strong id="cartTotalAmount">0 so'm</strong>
                    </div>
                    <button class="btn btn-success w-100" onclick="checkout()">Buyurtma berish</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="database.js"></script>
<script src="navbar.js"></script>
<script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (!isLoggedIn()) {
            window.location.href = "signIn.html";
            return;
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const id = parseInt(urlParams.get("id"));
        const products = getProducts();
        const product = products.find(p => p.id === id);
        
        if (!product) {
            window.location.href = "index.html";
            return;
        }
        
        document.getElementById("productImage").src = product.image;
        document.getElementById("productCategory").innerHTML = getCategoryName(product.category);
        document.getElementById("productName").innerHTML = product.name;
        document.getElementById("productPrice").innerHTML = product.price.toLocaleString() + " so'm";
        document.getElementById("productDesc").innerHTML = product.description || "Sifatli va sertifikatlangan dori preparati.";
        
        document.getElementById("addToCartBtn").onclick = () => {
            addToCart(product.id);
            openCartModal();
        };
    });
    
    function getCategoryName(cat) {
        const names = { antibiotik: "Antibiotik", ogriq: "Og'riq qoldiruvchi", vitamin: "Vitaminlar", yurak: "Yurak preparatlari", gormon: "Gormonlar" };
        return names[cat] || cat;
    }
</script>
</body>
</html>
