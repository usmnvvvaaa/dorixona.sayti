<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - MedPharm Dorixona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            font-weight: 600;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #0d6efd;
            color: white;
        }
        .tab-btn:first-child { border-radius: 10px 0 0 10px; }
        .tab-btn:last-child { border-radius: 0 10px 10px 0; }
        .form-section { display: none; }
        .form-section.visible { display: block; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="fas fa-prescription-bottle-alt fa-4x text-primary"></i>
            <h2 class="mt-2">MedPharm</h2>
            <p class="text-muted">Professional dorixona xizmati</p>
        </div>
        
        <div class="d-flex mb-4">
            <button class="tab-btn active" onclick="showTab('login')">Kirish</button>
            <button class="tab-btn" onclick="showTab('register')">Ro'yxatdan o'tish</button>
        </div>
        
        <div id="loginForm" class="form-section visible">
            <input type="text" id="loginUsername" class="form-control mb-3" placeholder="Username">
            <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Parol">
            <div id="loginError" class="text-danger mb-3 small"></div>
            <button class="btn btn-primary w-100" onclick="handleLogin()">Kirish</button>
            <div class="text-center mt-3 small text-muted">Admin: admin8 / 12345678</div>
        </div>
        
        <div id="registerForm" class="form-section">
            <input type="text" id="regName" class="form-control mb-2" placeholder="Ism">
            <input type="text" id="regLastName" class="form-control mb-2" placeholder="Familiya">
            <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email">
            <input type="text" id="regUsername" class="form-control mb-2" placeholder="Username">
            <input type="password" id="regPassword" class="form-control mb-2" placeholder="Parol (kamida 4 belgi)">
            <div id="registerError" class="text-danger mb-2 small"></div>
            <div id="registerSuccess" class="text-success mb-2 small"></div>
            <button class="btn btn-success w-100" onclick="handleRegister()">Ro'yxatdan o'tish</button>
        </div>
    </div>
    
    <script src="database.js"></script>
    <script src="signIn.js"></script>
</body>
</html>
